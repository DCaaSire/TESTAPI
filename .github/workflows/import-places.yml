name: Import NaviSli Places

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose dry-run first. Write mode changes Supabase."
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - write
      csv_path:
        description: "CSV path in the repository"
        required: true
        default: "data/navisli_places.csv"
        type: string

jobs:
  import-places:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest
          ruff check .

      - name: Validate starter CSV on pull request
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          navisli-places "data/navisli_places.csv" \
            --source-name "NaviSli starter dataset" \
            --dry-run

      - name: Validate required secrets for write mode
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'write' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          test -n "$SUPABASE_URL" || (echo "SUPABASE_URL secret is missing" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "SUPABASE_SERVICE_ROLE_KEY secret is missing" && exit 1)
          case "$SUPABASE_URL" in
            https://*.supabase.co|https://*.supabase.co/)
              ;;
            *)
              echo "SUPABASE_URL must be the project base URL, for example https://your-project-ref.supabase.co"
              echo "Do not use the Supabase dashboard URL and do not append /rest/v1."
              exit 1
              ;;
          esac

      - name: Dry-run import
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run' }}
        run: |
          navisli-places "${{ inputs.csv_path }}" \
            --source-name "NaviSli starter dataset" \
            --dry-run

      - name: Write import to Supabase
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'write' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          navisli-places "${{ inputs.csv_path }}" \
            --source-name "NaviSli starter dataset" \
            --write
