name: Import NaviSli Places

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose dry-run first. Write mode changes Supabase."
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - write
      csv_path:
        description: "CSV path in the repository"
        required: true
        default: "data/navisli_places.csv"
        type: string

jobs:
  import-places:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest
          ruff check .

      - name: Validate required secrets for write mode
        if: ${{ inputs.mode == 'write' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          test -n "$SUPABASE_URL" || (echo "SUPABASE_URL secret is missing" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "SUPABASE_SERVICE_ROLE_KEY secret is missing" && exit 1)

      - name: Dry-run import
        if: ${{ inputs.mode == 'dry-run' }}
        run: |
          navisli-places import-csv "${{ inputs.csv_path }}" \
            --source-name "NaviSli starter dataset" \
            --dry-run

      - name: Write import to Supabase
        if: ${{ inputs.mode == 'write' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          navisli-places import-csv "${{ inputs.csv_path }}" \
            --source-name "NaviSli starter dataset" \
            --write
